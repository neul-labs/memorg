site_name: Memorg Documentation
site_description: Hierarchical Context Management System for LLMs
site_author: Dipankar Sarkar
site_url: https://docs.neullabs.com/memorg/

repo_name: neul-labs/memorg
repo_url: https://github.com/neul-labs/memorg
edit_uri: edit/main/documentation/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guides:
    - guides/index.md
    - CLI Guide: guides/cli-guide.md
    - Library Usage: guides/library-usage.md
    - MCP Server: guides/mcp-server.md
    - Usage Patterns: guides/usage-patterns.md
  - API Reference:
    - reference/index.md
    - CLI Reference: reference/cli.md
  - Architecture:
    - architecture/index.md
    - Overview: architecture/overview.md
    - Technical Specification: architecture/technical-spec.md
    - Memory Abstraction: architecture/memory-abstraction.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neul-labs/memorg

copyright: Copyright &copy; 2024-2026 Dipankar Sarkar
